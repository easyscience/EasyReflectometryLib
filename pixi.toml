[project]
name = "easyreflectometry"
version = "0.1.0"
description = "A reflectometry python package built on the EasyScience framework."
authors = ["EasyScience contributors"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.11,<3.14"

[pypi-dependencies]
easyreflectometry = { path = ".", editable = true }

[tasks]
install-dev = "pip install -e '.[dev]'"
test = "pytest --cov=src/easyreflectometry tests --cov-branch --cov-report=xml:coverage-unit.xml"
lint = "ruff check ."
lint-fix = "ruff check . --fix"
build = "python -m build"

[feature.dev.dependencies]
build = "*"
codecov = "*"
coverage = "*"
coveralls = "*"
flake8 = "*"
ipykernel = "*"
jupyter = "*"
jupyterlab = "*"
plopp = "*"
pooch = "*"
pytest = "*"
pytest-cov = "*"
ruff = "*"
toml = "*"
yapf = "*"

[feature.docs.dependencies]
myst_parser = "*"
nbsphinx = "*"
sphinx = "8.1.3"
sphinx_autodoc_typehints = "*"
sphinx_book_theme = "*"
sphinx-copybutton = "*"
toml = "*"

[environments]
default = ["dev"]
docs = ["docs"]