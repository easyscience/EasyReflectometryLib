[project]
name = "easyreflectometry"
version = "0.1.0"
description = "A reflectometry python package built on the EasyScience framework."
authors = ["EasyScience contributors"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.11,<3.14"

[pypi-dependencies]
easyreflectometry = { path = ".", editable = true }
easyscience = "*"
scipp = "*"
refnx = "*"
refl1d = ">=1.0.0rc0"
orsopy = "*"
bumps = "*"
xhtml2pdf = "*"

[tasks]
install-dev = "pip install -e '.[dev]'"
test = "pytest --cov=src/easyreflectometry tests --cov-branch --cov-report=xml:coverage-unit.xml"
lint = "ruff check ."
lint-fix = "ruff check . --fix"
build = "python -m build"

[feature.dev.dependencies]
coverage = "*"
flake8 = "*"
ipykernel = "*"
jupyter = "*"
jupyterlab = "*"
pooch = "*"
pytest = "*"
pytest-cov = "*"
ruff = "*"
toml = "*"
yapf = "*"

[feature.dev.pypi-dependencies]
build = "*"
codecov = "*"
coveralls = "*"
plopp = "*"

[feature.docs.dependencies]
sphinx = "==8.1.3"
toml = "*"

[feature.docs.pypi-dependencies]
myst-parser = "*"
nbsphinx = "*"
sphinx-autodoc-typehints = "*"
sphinx-book-theme = "*"
sphinx-copybutton = "*"

[environments]
default = ["dev"]
docs = ["docs"]